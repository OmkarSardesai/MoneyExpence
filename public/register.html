<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Finora</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <h2>Create your account</h2>
        <p>Start managing your money professionally.</p>
        <form id="registerForm">
          <div class="form-group">
            <label for="fullName">Full name</label>
            <input id="fullName" name="fullName" type="text" placeholder="Jane Doe" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="At least 6 characters" required />
          </div>
          <button class="btn btn-primary" style="width:100%">Create account</button>
          <div class="auth-actions">
            <span>Already have one?</span>
            <a href="/login.html">Login</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = Object.fromEntries(new FormData(e.target));
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          alert(data.message);
          window.location.href = '/login.html';
        } else {
          alert(data.message || 'Registration failed');
        }
      });
    </script>
  </body>
</html>
